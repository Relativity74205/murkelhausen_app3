services:
  murkel3:
    image: ghcr.io/relativity74205/murkelhausen_app3/murkel_app3:1.9.1
    container_name: murkelhausen3
    restart: always
    ports:
      - "80:8000"
    hostname: murkel3
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - DJANGO__SECRET_KEY=${DJANGO__SECRET_KEY}
      - DJANGO__DEBUG=${DJANGO__DEBUG}
      - DJANGO__ALLOWED_HOSTS=${DJANGO__ALLOWED_HOSTS}
      - PIHOLE_PRIMARY_PASSWORD=${PIHOLE_PRIMARY_PASSWORD}
      - PIHOLE_BACKUP_PASSWORD=${PIHOLE_BACKUP_PASSWORD}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - GOOGLE_PRIVATE_KEY=${GOOGLE_PRIVATE_KEY}
      - GOOGLE_CLIENT_EMAIL=${GOOGLE_CLIENT_EMAIL}
      - GOOGLE_CALENDAR_ARKADIUS=${GOOGLE_CALENDAR_ARKADIUS}
      - GOOGLE_CALENDAR_FAMILIE=${GOOGLE_CALENDAR_FAMILIE}
      - GOOGLE_CALENDAR_ERIK=${GOOGLE_CALENDAR_ERIK}
      - GOOGLE_CALENDAR_MATTIS=${GOOGLE_CALENDAR_MATTIS}
      - GOOGLE_CALENDAR_ANDREA=${GOOGLE_CALENDAR_ANDREA}
      - GOOGLE_CALENDAR_GEBURTSTAGE=${GOOGLE_CALENDAR_GEBURTSTAGE}
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - GARMIN_DB_HOST=${GARMIN_DB_HOST}
      - GARMIN_DB_PORT=${GARMIN_DB_PORT}
      - GARMIN_DB_USER=${GARMIN_DB_USER}
      - GARMIN_DB_PASSWORD=${GARMIN_DB_PASSWORD}
      - GARMIN_DB_NAME=${GARMIN_DB_NAME}
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
  murkel3-worker:
    image: ghcr.io/relativity74205/murkelhausen_app3/murkel_app3:1.9.1
    container_name: murkelhausen3-worker
    restart: always
    hostname: murkel3-worker
    entrypoint: ["/usr/app/entrypoint-worker.sh"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - DJANGO__SECRET_KEY=${DJANGO__SECRET_KEY}
      - DJANGO__DEBUG=${DJANGO__DEBUG}
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - GARMIN_DB_HOST=${GARMIN_DB_HOST}
      - GARMIN_DB_PORT=${GARMIN_DB_PORT}
      - GARMIN_DB_USER=${GARMIN_DB_USER}
      - GARMIN_DB_PASSWORD=${GARMIN_DB_PASSWORD}
      - GARMIN_DB_NAME=${GARMIN_DB_NAME}
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}